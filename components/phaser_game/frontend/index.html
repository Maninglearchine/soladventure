function startBattleGame(onComplete) {
  const overlay = document.getElementById('battle-game-overlay');
  const canvas  = document.getElementById('battle-canvas');
  const ctx     = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 모든 서브 오버레이 초기화
  ['battle-intro','battle-narration','battle-action-result','battle-result-overlay']
    .forEach(id => { document.getElementById(id).style.display = 'none'; });

  overlay.style.display = 'flex';

  // ── 인트로 화면 ──────────────────────────────────────
  const worldName = { space:'별빛 금융 은하', dinosaur:'공룡 정글', magic:'마법 왕국', ocean:'파도 저금섬' }[window.GCFG?.world] || '핀퀘스트';
  const intro = document.getElementById('battle-intro');
  document.getElementById('battle-intro-title').textContent = '🚨 긴급 경보! 금융 악당 출현!';
  document.getElementById('battle-intro-body').innerHTML =
    `${worldName}에 수상한 악당이 나타났어요!<br>` +
    `이 악당은 어린이들의 금융 지식을 빼앗으러 왔대요. 😱<br><br>` +
    `쏠쏠이가 나서야 할 때예요! 퀴즈를 맞혀야만<br>공격과 방어가 가능해요. 용기 있게 도전해보세요! 💪`;
  intro.style.display = 'flex';

  // 전투 시작 버튼
  document.getElementById('battle-intro-btn').onclick = () => {
    intro.style.display = 'none';
    battleStarted = true;
    lastTime = null;
    requestAnimationFrame(loop);
  };

  const GROUND_Y = H * 0.78; // characters stand at 78% height

  let state = {
    playerHp: 3, villHp: 3,
    playerCooldown: 0,    // ms remaining
    villCooldown: 0,
    playerState: 'idle',  // idle | attack | hit | defend | blocked
    villState: 'idle',
    playerStateTimer: 0,
    villStateTimer: 0,
    villMoveTimer: 0,
    quizActive: false,
    done: false,
    defendWindowActive: false,  // Z키 방어 가능 구간
    playerDefended: false,      // Z키로 방어 완료 여부
  };

  // Positions
  let playerX = W * 0.18;
  const VILL_X_START = W * 0.78;
  let villX = VILL_X_START;
  const PLAYER_SPEED = 5;
  const keys = { left: false, right: false };

  const ATTACK_COOLDOWN = 1000;
  const STATE_DURATION  = 500;

  // ── 내레이션 (잠깐 보여주고 callback) ────────────────
  function showNarration(text, duration, cb) {
    const el = document.getElementById('battle-narration');
    document.getElementById('battle-narration-text').innerHTML = text;
    el.style.display = 'flex';
    setTimeout(() => { el.style.display = 'none'; cb(); }, duration);
  }

  // ── 결과 메시지 (잠깐 보여주고 callback) ─────────────
  function showActionResult(text, color, duration, imgSrc, cb) {
    const el  = document.getElementById('battle-action-result');
    const txt = document.getElementById('battle-action-result-text');
    txt.style.color = color;

    if (imgSrc) {
      txt.innerHTML =
        `<img src="${imgSrc}" style="height:130px; object-fit:contain; margin-bottom:12px; display:block; margin-left:auto; margin-right:auto;">` +
        `<div style="white-space:pre-line;">${text}</div>`;
    } else {
      txt.style.whiteSpace = 'pre-line';
      txt.textContent = text;
    }

    state.quizActive = true;
    el.style.display = 'flex';
    if (duration <= 0) {
      el.style.cursor = 'pointer';
      const dismiss = () => {
        el.style.display = 'none';
        el.style.cursor = '';
        el.removeEventListener('click', dismiss);
        state.quizActive = false;
        cb();
      };
      el.addEventListener('click', dismiss);
    } else {
      setTimeout(() => { el.style.display = 'none'; state.quizActive = false; cb(); }, duration);
    }
  }

  // Load images
  const imgs = {};
  const imgKeys = ['solsol1','solsol2','solsol3','solsol5','vill1','vill2','vill3','vill5','bg_battle'];
  imgKeys.forEach(k => {
    const img = new Image();
    img.src = k === 'bg_battle' ? 'assets/bg_battle.jpg' : `assets/${k}.png`;
    imgs[k] = img;
  });

  function getCharImg(key) { return imgs[key]; }

  function getPlayerImg() {
    if (state.playerState === 'attack')  return getCharImg('solsol3');
    if (state.playerState === 'hit')     return getCharImg('solsol2');
    if (state.playerState === 'defend')  return getCharImg('solsol5');
    return getCharImg('solsol1');
  }
  function getVillImg() {
    if (state.villState === 'attack')  return getCharImg('vill3');
    if (state.villState === 'hit')     return getCharImg('vill2');
    if (state.villState === 'blocked') return getCharImg('vill5');
    return getCharImg('vill1');
  }

  function updateHUD() {
    const hp = n => '❤️'.repeat(Math.max(0,n)) + '🖤'.repeat(Math.max(0,3-n));
    document.getElementById('battle-hp-player').textContent = hp(state.playerHp) + ' 쏠쏠이';
    document.getElementById('battle-hp-vill').textContent   = '빌런 ' + hp(state.villHp);
    const cd = state.playerCooldown;
    const cdEl = document.getElementById('battle-cooldown');
    if (state.defendWindowActive) {
      cdEl.textContent = '🛡️ Z키로 방어!';
      cdEl.style.color = '#86efac';
    } else if (cd > 0) {
      cdEl.textContent = `쿨타임 ${(cd/1000).toFixed(1)}초`;
      cdEl.style.color = '#fbbf24';
    } else {
      cdEl.textContent = '⚔️ 공격 준비!';
      cdEl.style.color = '#fbbf24';
    }
  }

  function endBattle(win) {
    state.done = true;
    document.getElementById('quiz-overlay').style.display = 'none';
    const resOv   = document.getElementById('battle-result-overlay');
    const resTxt  = document.getElementById('battle-result-text');
    const resBtns = document.getElementById('battle-result-btns');
    resTxt.textContent = win ? '🎉 쏠쏠이 승리!' : '💀 패배...';
    resBtns.innerHTML = '';
    const retryBtn = document.createElement('button');
    retryBtn.textContent = '🔄 다시 도전';
    retryBtn.style.cssText = 'padding:14px 32px;font-size:1.1rem;font-weight:800;border:none;border-radius:12px;background:#4361ee;color:white;cursor:pointer;';
    retryBtn.onclick = () => {
      resOv.style.display = 'none';
      overlay.style.display = 'none';
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('keyup', onKeyUp);
      startBattleGame(onComplete);
    };
    const nextBtn = document.createElement('button');
    nextBtn.textContent = '✅ 완료 & 다음으로';
    nextBtn.style.cssText = 'padding:14px 32px;font-size:1.1rem;font-weight:800;border:none;border-radius:12px;background:#22c55e;color:white;cursor:pointer;';
    nextBtn.onclick = () => {
      resOv.style.display = 'none';
      overlay.style.display = 'none';
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('keyup', onKeyUp);
      setVal({ type: 'STAGE2_WIN', ts: Date.now(), total_coins: window.GS.coins });
      if (onComplete) onComplete();
    };
    resBtns.appendChild(retryBtn);
    resBtns.appendChild(nextBtn);
    resOv.style.display = 'flex';
  }

  // ── Quiz popup — 기존 #quiz-overlay 재사용 ───────────────────
  // mode: 'attack' | 'defend'
  function showBattleQuiz(mode, onResolve) {
    state.quizActive = true;
    keys.left = keys.right = false;

    // 월드·나이별 배틀 퀴즈 풀에서 선택 (중복 최소화)
    const raw = _randomQuiz();
    const quiz = {
      question: raw.q,
      choices: raw.choices.map((t, i) => ({ text: t, correct: i === raw.correct })),
      concept: '금융 개념',
    };

    // 라벨 변경
    const label = mode === 'attack'
      ? '⚔️ 공격 퀴즈! 맞추면 타격 성공!'
      : '🛡️ 방어 퀴즈! 맞추면 막기 성공!';
    document.getElementById('quiz-concept').textContent = label;
    document.getElementById('quiz-question').textContent = quiz.question;

    const box  = document.getElementById('quiz-choices');
    box.innerHTML = '';
    const nums = ['① ', '② ', '③ ', '④ '];
    let answered = false;

    (quiz.choices || []).forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-btn';
      btn.textContent = nums[i] + ch.text;
      btn.onclick = () => {
        if (answered) return;
        answered = true;
        const correct = !!ch.correct;

        if (!correct) {
          btn.classList.add('shaking');
          setTimeout(() => btn.classList.remove('shaking'), 450);
          // 오답: 잠깐 보여주다가 닫기
          setTimeout(() => {
            document.getElementById('quiz-overlay').style.display = 'none';
            state.quizActive = false;
            onResolve(false);
          }, 900);
        } else {
          btn.style.background = 'rgba(34,197,94,.35)';
          btn.style.borderColor = '#22c55e';
          setTimeout(() => {
            document.getElementById('quiz-overlay').style.display = 'none';
            state.quizActive = false;
            onResolve(true);
          }, 900);
        }
      };
      box.appendChild(btn);
    });

    // 패널 애니메이션
    const panel = document.getElementById('quiz-panel');
    panel.style.animation = 'none';
    void panel.offsetWidth;
    panel.style.animation = 'slideUp .4s cubic-bezier(.34,1.56,.64,1)';

    document.getElementById('quiz-overlay').style.display = 'flex';
  }

  function onKey(e) {
    if (state.done) return;
    if (e.code === 'ArrowLeft')  { keys.left  = true; e.preventDefault(); return; }
    if (e.code === 'ArrowRight') { keys.right = true; e.preventDefault(); return; }

    // ── Z키: 방어 ──────────────────────────────────────────────────
    if (e.code === 'KeyZ') {
      e.preventDefault();
      if (state.defendWindowActive) {
        state.defendWindowActive = false;
        state.playerDefended = true;
        state.playerState = 'defend';
        state.playerStateTimer = 800;
        showActionResult('🛡️ Z키 방어 성공!', '#86efac', 1100, 'assets/solsol5.png', () => {
          state.playerState = 'idle';
          state.quizActive = false;
        });
      } else if (!state.quizActive) {
        state.playerState = 'defend';
        state.playerStateTimer = 600;
      }
      return;
    }

    if (state.quizActive) return;
    if (e.code !== 'Space') return;
    e.preventDefault();
    if (state.playerCooldown > 0) return;
    const dist = Math.abs(villX - playerX);
    const inRange = dist < W * 0.12;
    state.playerCooldown = ATTACK_COOLDOWN;
    // 공격 모션은 거리에 상관없이 항상 발동
    state.playerState = 'attack';
    state.playerStateTimer = STATE_DURATION;
    state.quizActive = true;

    if (!inRange) {
      setTimeout(() => { state.quizActive = false; }, 500);
      return;
    }

    // 범위 안: 퀴즈 → 데미지
    showNarration('⚔️ 악당에게 돌격했어요!<br><span style="font-size:1.1rem;color:#fbbf24;">퀴즈를 맞혀서 공격을 성공시켜보세요!</span>', 1400, () => {
      showBattleQuiz('attack', (correct) => {
        if (correct) {
          showActionResult('💥 공격 성공!', '#fbbf24', 1000, null, () => {
            state.villState = 'hit';
            state.villStateTimer = STATE_DURATION;
            state.villHp--;
            updateHUD();
            if (state.villHp <= 0) {
              setTimeout(() => {
                window.GS.coins = (window.GS.coins || 0) + 50;
                setVal({ type: 'COIN_COLLECTED', total_coins: window.GS.coins });
                showActionResult('🏆 빌런 처치 완료!\n+50 쏠코인 획득!\n\n👆 화면 클릭해서 계속하기', '#ffd700', 0, 'assets/solsol5.png', () => {
                  showCardAcquired('assets/card/villcard.png', () => endBattle(true));
                });
              }, 600);
            }
          });
        } else {
          showActionResult('🛡️ 악당이 막아냈어요!', '#94a3b8', 1000, 'assets/vill5.png', () => {
            state.villState = 'blocked';
            state.villStateTimer = STATE_DURATION;
            updateHUD();
          });
        }
      });
    });
  }
  function onKeyUp(e) {
    if (e.code === 'ArrowLeft')  keys.left  = false;
    if (e.code === 'ArrowRight') keys.right = false;
  }
  document.addEventListener('keydown', onKey);
  document.addEventListener('keyup', onKeyUp);

  let battleStarted = false;
  let lastTime = null;
  function loop(ts) {
    if (!battleStarted) return;
    if (state.done) return;
    const dt = lastTime ? Math.min(ts - lastTime, 100) : 16;
    lastTime = ts;

    if (!state.quizActive) {
      // ── Player movement ──
      const CHAR_W_MOVE = H * 0.19 * 0.7;
      if (keys.left)  playerX = Math.max(CHAR_W_MOVE / 2, playerX - PLAYER_SPEED);
      if (keys.right) playerX = Math.min(W - CHAR_W_MOVE / 2, playerX + PLAYER_SPEED);

      // ── Update timers ──
      if (state.playerCooldown > 0) state.playerCooldown = Math.max(0, state.playerCooldown - dt);
      if (state.playerStateTimer > 0) {
        state.playerStateTimer -= dt;
        if (state.playerStateTimer <= 0) state.playerState = 'idle';
      }
      if (state.villStateTimer > 0) {
        state.villStateTimer -= dt;
        if (state.villStateTimer <= 0) state.villState = 'idle';
      }

      // ── Villain AI ──
      state.villMoveTimer -= dt;
      if (state.villMoveTimer <= 0) {
        const dist = villX - playerX;
        if (Math.abs(dist) < W * 0.12) {
          if (state.villCooldown <= 0) {
            state.villState = 'attack';
            state.villStateTimer = STATE_DURATION;
            state.villCooldown = 2800;
            state.quizActive = true;
            // Z키 방어 윈도우 열기
            state.defendWindowActive = true;
            state.playerDefended = false;
            // 공격 액션 0.5초 → 내레이션 → 퀴즈 (단, Z키로 막으면 건너뜀)
            setTimeout(() => {
              if (state.playerDefended) return; // Z키로 이미 방어됨
              showNarration('💢 악당이 공격해왔어요!<br><span style="font-size:1.1rem;color:#f87171;">Z키로 막거나 퀴즈를 맞혀 방어하세요!</span>', 1400, () => {
                if (state.playerDefended) return; // 내레이션 중에 Z키 눌렀을 경우
                state.defendWindowActive = false;
                showBattleQuiz('defend', (correct) => {
                  if (correct) {
                    showActionResult('🛡️ 방어 성공!', '#86efac', 1000, 'assets/solsol5.png', () => {
                      state.playerState = 'defend';
                      state.playerStateTimer = STATE_DURATION;
                    });
                  } else {
                    showActionResult('💥 방어 실패...', '#f87171', 1000, null, () => {
                      state.playerState = 'hit';
                      state.playerStateTimer = STATE_DURATION;
                      state.playerHp--;
                      updateHUD();
                      if (state.playerHp <= 0) { setTimeout(() => endBattle(false), 600); }
                    });
                  }
                });
              });
            }, 500);
          }
          state.villMoveTimer = 900;
        } else {
          villX += dist > 0 ? -4 : 4;
          state.villMoveTimer = 30;
        }
      }
      if (state.villCooldown > 0) state.villCooldown = Math.max(0, state.villCooldown - dt);
    }

    // ── Draw ──
    if (imgs.bg_battle.complete) {
      ctx.drawImage(imgs.bg_battle, 0, 0, W, H);
    } else {
      ctx.fillStyle = '#1a3a5c';
      ctx.fillRect(0, 0, W, H);
    }

    const CHAR_H = H * 0.19;
    const CHAR_W = CHAR_H * 0.7;

    // Player
    const pImg = getPlayerImg();
    const playerFaceRight = playerX < villX;
    if (pImg && pImg.complete) {
      if (playerFaceRight) {
        ctx.drawImage(pImg, playerX - CHAR_W/2, GROUND_Y - CHAR_H, CHAR_W, CHAR_H);
      } else {
        ctx.save();
        ctx.translate(playerX + CHAR_W/2, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(pImg, 0, GROUND_Y - CHAR_H, CHAR_W, CHAR_H);
        ctx.restore();
      }
    }

    // Villain (flipped to face player)
    const vImg = getVillImg();
    if (vImg && vImg.complete) {
      ctx.save();
      ctx.translate(villX + CHAR_W/2, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(vImg, 0, GROUND_Y - CHAR_H, CHAR_W, CHAR_H);
      ctx.restore();
    }

    // HP bars
    function drawHPBar(x, y, hp, color) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x - 30, y, 60, 8);
      ctx.fillStyle = color;
      ctx.fillRect(x - 30, y, 60 * (hp / 3), 8);
    }
    drawHPBar(playerX, GROUND_Y - CHAR_H - 14, state.playerHp, '#22c55e');
    drawHPBar(villX,   GROUND_Y - CHAR_H - 14, state.villHp,   '#ef4444');

    // Cooldown bar
    if (state.playerCooldown > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(playerX - 30, GROUND_Y - CHAR_H - 26, 60, 6);
      ctx.fillStyle = '#fbbf24';
      ctx.fillRect(playerX - 30, GROUND_Y - CHAR_H - 26, 60 * (1 - state.playerCooldown / ATTACK_COOLDOWN), 6);
    }

    updateHUD();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
